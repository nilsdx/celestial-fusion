name: Build check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Clean install
        run: npm ci

      - name: Run ESLint
        run: npx eslint .

      - name: Build
        run: npm run build